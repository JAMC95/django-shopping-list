version: "3.9"

services:
  web:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - staticfiles:/app/staticfiles
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.development
      - SECRET_KEY=change-me-in-production
      - ALLOWED_HOSTS=0.0.0.0
    command: ["python", "manage.py", "runserver", "0.0.0.0:8000"]

volumes:
  staticfiles:
